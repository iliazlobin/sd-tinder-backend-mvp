name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-unit-${{ github.ref }}
      cancel-in-progress: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tinder
          POSTGRES_PASSWORD: tinder
          POSTGRES_DB: tinder
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://tinder:tinder@localhost:5432/tinder
        run: pytest tests/unit/ -v

  e2e:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-e2e-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Bring up stack
        env:
          APP_PORT: "8020"
        run: |
          set -e
          docker compose up --build -d
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8020/healthz 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "App healthy (HTTP $STATUS)"
              break
            fi
            echo "Waiting for app... attempt $i/30 (HTTP $STATUS)"
            sleep 2
          done
          curl -sf http://localhost:8020/healthz

      - name: Run migrations
        run: docker compose exec -T app alembic upgrade head

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run acceptance tests
        env:
          API_BASE_URL: http://localhost:8020
        run: |
          python -m pip install httpx pytest
          pytest verify/acceptance/ -v

      - name: Tear down
        if: always()
        run: docker compose down -v
